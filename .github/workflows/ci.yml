name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
      - 'hotfix/**'
      - 'claude/**'
  pull_request: # run on ALL pull requests regardless of base branch

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: mobile-ide/mobile-ide-prototype

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Type-check ──────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

  # ── 2. Build Check ────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npm run build
        env:
          CI: true

  # ── 3. Unit Tests + 80% Coverage Gate ────────────────────────────────────
  test:
    name: Unit Tests (coverage ≥ 80%)
    runs-on: ubuntu-latest
    # Re-run flaky tests once before failing
    continue-on-error: false
    permissions:
      pull-requests: write  # allow coverage comment on PR

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --ci exits 1 on threshold breach; --forceExit prevents hanging workers
      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit --testRetry=1 --reporters=default --reporters=jest-junit
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: coverage-report
          path: docs/coverage/
          retention-days: 14

      - name: Upload JUnit results
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: test-results
          path: mobile-ide/mobile-ide-prototype/junit.xml
          retention-days: 14

      # Post coverage diff comment on every PR.
      # json-final-path must point to the coverage-final.json Jest produces.
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true
        with:
          json-summary-path: docs/coverage/coverage-summary.json
          json-final-path: docs/coverage/coverage-final.json

  # ── 4. Bundle Size Gate ───────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    # Only check on PRs so we get a meaningful diff comment
    if: github.event_name == 'pull_request'
    needs: [build]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npm run build
        env:
          CI: true

      # Fails the job if any limit in .size-limit.json is exceeded
      - name: Check bundle size
        run: npm run size
        env:
          CI: true

      # Post a size comparison comment on the PR
      - name: Post size comment
        uses: andresz1/size-limit-action@v1
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: mobile-ide/mobile-ide-prototype

  # ── 5. Security — Dependency Audit ────────────────────────────────────────
  security-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Block on HIGH or CRITICAL vulnerabilities in production deps.
      # Uses audit-ci so known-unfixable issues (expo@52 tar CVEs) can be
      # allowlisted in audit-ci.json without silencing all HIGH checks.
      - name: Audit production dependencies
        run: npx --yes audit-ci@^7 --omit=dev

      # Report dev dep issues (informational — non-blocking)
      - name: Audit dev dependencies
        run: npm audit --audit-level=critical
        continue-on-error: true

  # ── 6. Security — Static Analysis (Semgrep) ───────────────────────────────
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_TIMEOUT: 300

  # ── 7. Security — CodeQL ──────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  # ── 8. Security — Secret Scanning (Gitleaks) ─────────────────────────────
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 9. E2E Tests — iOS iPad Simulator ────────────────────────────────────
  e2e-ios:
    name: E2E Tests (iOS iPad Simulator)
    runs-on: macos-14
    # Only run on PRs targeting main — E2E is slow and expensive
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [lint-and-typecheck, test]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      # Cache Xcode DerivedData — reduces cold build from ~25 min to ~5 min.
      # Must be placed before the build step; cache is saved at job end.
      - name: Cache Xcode DerivedData
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-deriveddata-${{ hashFiles('mobile-ide/mobile-ide-prototype/package-lock.json') }}
          restore-keys: xcode-deriveddata-

      # Cache the Pods directory keyed on npm deps (expo/RN version drives pod versions)
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: mobile-ide/mobile-ide-prototype/ios/Pods
          key: pods-${{ hashFiles('mobile-ide/mobile-ide-prototype/package-lock.json') }}
          restore-keys: pods-

      - name: Install dependencies
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Install applesimutils
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew tap wix/brew
          HOMEBREW_NO_AUTO_UPDATE=1 brew install applesimutils

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install
        working-directory: mobile-ide/mobile-ide-prototype

      - name: Install iOS pods
        run: npx pod-install
        working-directory: mobile-ide/mobile-ide-prototype/ios

      - name: Build Detox iOS
        run: npm run test:e2e:build:ios

      - name: Run Detox E2E (iPad)
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E artifacts on failure
        uses: actions/upload-artifact@v7.0.0
        if: failure()
        with:
          name: detox-artifacts-ios
          path: mobile-ide/mobile-ide-prototype/artifacts/
          retention-days: 7

  # ── 10. E2E Tests — Android Emulator ──────────────────────────────────────
  e2e-android:
    name: E2E Tests (Android Emulator)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [lint-and-typecheck, test]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile-ide/mobile-ide-prototype/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
        working-directory: mobile-ide/mobile-ide-prototype

      # expo prebuild regenerates android/ fresh, so the committed gradle.properties
      # is overwritten. Pin kotlin-gradle-plugin to 1.9.25 here because the RN 0.76
      # Gradle plugin resolves 1.9.24 by default, which is incompatible with
      # expo-modules-core's Compose Compiler 1.5.15 (requires Kotlin >=1.9.25).
      - name: Pin Kotlin version in generated build.gradle
        run: |
          sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.25')/" \
            android/build.gradle

      - name: Build Detox Android
        run: npm run test:e2e:build:android

      - name: Run Detox E2E (Android)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd mobile-ide/mobile-ide-prototype && npm run test:e2e:android

      - name: Upload E2E artifacts on failure
        uses: actions/upload-artifact@v7.0.0
        if: failure()
        with:
          name: detox-artifacts-android
          path: mobile-ide/mobile-ide-prototype/artifacts/
          retention-days: 7

  # ── 11. Plan Visualizer Tools Tests ──────────────────────────────────────
  plan-visualizer-test:
    name: Plan Visualizer Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci
        env:
          CI: true

  # ── 12. Release gate — all jobs must pass ────────────────────────────────
  create-release:
    name: Tag Release
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/heads/hotfix/'))
    needs:
      - lint-and-typecheck
      - build
      - test
      - plan-visualizer-test
      - security-audit
      - semgrep
      - codeql
      - gitleaks

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          VERSION="${VERSION#hotfix/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
