version: 2

updates:
  # ── npm — prototype app ────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /mobile-ide/mobile-ide-prototype
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 10
    target-branch: develop
    labels:
      - dependencies
      - javascript
    groups:
      # Group all Expo SDK packages into one PR
      expo:
        patterns:
          - "expo"
          - "expo-*"
      # Group all React Native packages into one PR
      react-native:
        patterns:
          - "react-native"
          - "react-native-*"
          - "@react-native*"
      # Group all testing packages into one PR
      testing:
        patterns:
          - "jest*"
          - "@testing-library*"
          - "detox"
          - "@types/jest"
      # Group all TypeScript / type packages
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
    ignore:
      # Pin major Expo SDK version — upgrade manually via Expo's migration guide
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    target-branch: develop
    labels:
      - dependencies
      - github-actions
